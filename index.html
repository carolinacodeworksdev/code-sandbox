<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdnjs.cloudflare.com;">
<title>JS Sandbox</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/one-dark.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #1e1e1e;
  --bg2:     #252526;
  --bg3:     #2d2d2d;
  --border:  #3a3a3a;
  --text:    #d4d4d4;
  --muted:   #858585;
  --dim:     #4a4a4a;
  --blue:    #569cd6;
  --green:   #4ec9a0;
  --yellow:  #dcdcaa;
  --red:     #f44747;
  --orange:  #ce9178;
  --accent:  #007acc;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; overflow: hidden; }

#app { display: flex; flex-direction: column; height: 100vh; }

/* ── Header ── */
#header {
  display: flex; align-items: center; gap: 10px;
  padding: 0 12px; height: 42px;
  background: var(--bg2); border-bottom: 1px solid var(--border);
  -webkit-app-region: drag; flex-shrink: 0;
}
#header .logo { font-size: 13px; font-weight: 600; color: var(--blue); letter-spacing: 0.05em; -webkit-app-region: no-drag; }
#header .spacer { flex: 1; }
.hbtn {
  -webkit-app-region: no-drag;
  background: transparent; border: 1px solid var(--border);
  color: var(--muted); border-radius: 4px; padding: 4px 12px;
  font-size: 12px; cursor: pointer; font-family: inherit;
  transition: all 0.1s;
}
.hbtn:hover { background: var(--bg3); color: var(--text); }
.hbtn.run { border-color: var(--accent); color: var(--blue); }
.hbtn.run:hover { background: #0e3a5c; }
.hbtn.danger:hover { border-color: var(--red); color: var(--red); }
#shortcut-hint { font-size: 11px; color: var(--dim); -webkit-app-region: no-drag; }

/* ── Tab bar ── */
#tabbar {
  display: flex; align-items: flex-end;
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 0 8px; height: 35px; gap: 2px; flex-shrink: 0;
}
.tab {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 14px 5px 14px; cursor: pointer;
  font-size: 12px; color: var(--muted);
  border: 1px solid transparent; border-bottom: none;
  border-radius: 4px 4px 0 0;
  position: relative; top: 1px;
  max-width: 160px; white-space: nowrap;
  transition: color 0.1s;
}
.tab.active { background: var(--bg); border-color: var(--border); color: var(--text); }
.tab:hover:not(.active) { color: var(--text); }
.tab-close { opacity: 0; font-size: 15px; line-height: 1; padding: 0 2px; border-radius: 3px; color: var(--muted); }
.tab:hover .tab-close, .tab.active .tab-close { opacity: 1; }
.tab-close:hover { background: #4a3030; color: var(--red); }
#add-tab { background: none; border: none; color: var(--dim); font-size: 20px; cursor: pointer; padding: 0 8px; border-radius: 4px; line-height: 1; margin-bottom: 2px; }
#add-tab:hover { color: var(--text); background: var(--bg3); }

/* ── Split layout ── */
#split { display: flex; flex-direction: column; flex: 1; min-height: 0; }
#editor-wrap { flex: 1; min-height: 0; overflow: hidden; }

/* ── CodeMirror ── */
.CodeMirror { height: 100% !important; font-family: inherit !important; font-size: 13.5px !important; line-height: 1.65 !important; background: var(--bg) !important; }
.CodeMirror-scroll { height: 100% !important; }
.CodeMirror-gutters { background: var(--bg) !important; border-right: 1px solid var(--border) !important; padding-right: 4px; }
.CodeMirror-linenumber { color: var(--dim) !important; }
.CodeMirror-cursor { border-left: 2px solid var(--blue) !important; }
.CodeMirror-selected { background: #264f78 !important; }
.CodeMirror-matchingbracket { background: #1d4d1d !important; color: var(--green) !important; outline: none !important; }
.CodeMirror-activeline-background { background: rgba(255,255,255,0.03) !important; }

/* ── Divider ── */
#divider {
  height: 6px; background: var(--bg2);
  border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  cursor: ns-resize; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
#divider::after { content: ''; width: 36px; height: 2px; background: var(--border); border-radius: 2px; }
#divider:hover { background: #2a2d2e; }

/* ── Output ── */
#output-pane { height: 230px; min-height: 80px; display: flex; flex-direction: column; flex-shrink: 0; }
#output-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 12px; background: var(--bg2); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#output-bar .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; }
#output-bar .obar-btns { display: flex; gap: 4px; }
.obtn { background: none; border: none; color: var(--dim); font-size: 11px; cursor: pointer; padding: 2px 7px; border-radius: 3px; font-family: inherit; }
.obtn:hover { background: var(--bg3); color: var(--muted); }
#output-scroll { flex: 1; overflow-y: auto; padding: 8px 14px; }
#output-scroll::-webkit-scrollbar { width: 6px; }
#output-scroll::-webkit-scrollbar-track { background: transparent; }
#output-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.entry { display: flex; gap: 10px; padding: 2px 0; font-size: 12.5px; line-height: 1.55; }
.entry:hover { background: rgba(255,255,255,0.025); }
.e-ts { color: var(--dim); font-size: 10px; min-width: 54px; line-height: 2; flex-shrink: 0; }
.e-ico { min-width: 12px; flex-shrink: 0; line-height: 1.7; }
.e-txt { white-space: pre-wrap; word-break: break-all; flex: 1; }
.e-log .e-txt  { color: var(--text); }
.e-warn        { background: rgba(220,160,50,0.05); }
.e-warn .e-txt { color: #dca850; }
.e-err         { background: rgba(244,71,71,0.06); }
.e-err .e-txt  { color: var(--red); }
.e-ret .e-txt  { color: var(--blue); }
.e-info .e-txt { color: #9cdcfe; }
.e-sep { border-top: 1px solid var(--border); margin: 5px 0 3px; }
.e-hint { color: var(--dim); font-size: 12px; padding: 10px 0; font-style: italic; }

/* ── Status bar ── */
#statusbar {
  display: flex; align-items: center; gap: 16px;
  padding: 0 12px; height: 22px;
  background: var(--accent); color: #fff;
  font-size: 11px; flex-shrink: 0;
}
#statusbar span { opacity: 0.85; }
#status-msg { margin-left: auto; opacity: 1 !important; }
</style>
</head>
<body>
<div id="app">

  <div id="header">
    <span class="logo">⬡ JS Sandbox <span style="font-size:10px;color:var(--dim);font-weight:400;margin-left:6px">v1.0.0 by Carolina Codeworks</span></span>
    <button class="hbtn run" id="btn-run">▶ Run</button>
    <button class="hbtn" id="btn-clear">Clear</button>
    <button class="hbtn danger" id="btn-reset">Reset</button>
    <div class="spacer"></div>
    <span id="shortcut-hint">Ctrl+Enter to run &nbsp;·&nbsp; Ctrl+/ comment</span>
  </div>

  <div id="tabbar">
    <div class="tab active" data-id="0">
      <span class="tab-name">scratch.js</span>
      <span class="tab-close">×</span>
    </div>
    <button id="add-tab" title="New tab">+</button>
  </div>

  <div id="split">
    <div id="editor-wrap"></div>
    <div id="divider"></div>
    <div id="output-pane">
      <div id="output-bar">
        <span class="label">Console</span>
        <div class="obar-btns">
          <button class="obtn" id="btn-wrap">wrap</button>
          <button class="obtn" id="btn-autoscroll">auto-scroll ✓</button>
        </div>
      </div>
      <div id="output-scroll">
        <div class="e-hint">// Hit Ctrl+Enter (or the Run button) to execute your code</div>
      </div>
    </div>
  </div>

  <div id="statusbar">
    <span id="s-pos">Ln 1, Col 1</span>
    <span id="s-mode">JavaScript</span>
    <span id="status-msg"></span>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/comment/comment.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/selection/active-line.min.js"></script>

<script>
// ── State ────────────────────────────────────────────────────────────────────
const DEFAULT_CODE = `// JS Sandbox — Ctrl+Enter to run, Ctrl+/ to toggle comment
// Results appear in the console below.

function greet(name) {
  return \`Hello, \${name}! Welcome to JS Sandbox.\`;
}
console.log(greet('Brian'));

// Objects are pretty-printed
const person = { name: 'Brian', role: 'developer', active: true };
console.log('Person:', person);

// Arrays too
const nums = [1, 2, 3, 4, 5];
console.log('Doubled:', nums.map(n => n * 2));

// Warnings and errors show in different colors
console.warn('This is a warning');
// console.error('This is an error');
`;

let tabs       = { 0: { name: 'scratch.js', code: DEFAULT_CODE } };
let activeId   = 0;
let tabCounter = 1;
let autoScroll = true;
let wordWrap   = false;
let statusTimer;

// ── Editor ───────────────────────────────────────────────────────────────────
const cm = CodeMirror(document.getElementById('editor-wrap'), {
  value: DEFAULT_CODE,
  mode: 'javascript',
  theme: 'one-dark',
  lineNumbers: true,
  matchBrackets: true,
  autoCloseBrackets: true,
  styleActiveLine: true,
  indentWithTabs: false,
  tabSize: 2,
  indentUnit: 2,
  extraKeys: {
    'Ctrl-Enter': run,
    'Cmd-Enter':  run,
    'Ctrl-/':     cm => cm.toggleComment(),
    'Cmd-/':      cm => cm.toggleComment(),
    'Tab':        cm => cm.execCommand('insertSoftTab')
  }
});

cm.on('cursorActivity', () => {
  const c = cm.getCursor();
  document.getElementById('s-pos').textContent = `Ln ${c.line + 1}, Col ${c.ch + 1}`;
});

// ── Tabs ─────────────────────────────────────────────────────────────────────
function saveActive() { tabs[activeId].code = cm.getValue(); }

function switchTab(id) {
  saveActive();
  activeId = id;
  cm.setValue(tabs[id].code);
  cm.focus();
  renderTabs();
}

function renderTabs() {
  const bar    = document.getElementById('tabbar');
  const addBtn = document.getElementById('add-tab');
  bar.innerHTML = '';
  Object.entries(tabs).forEach(([id, tab]) => {
    const el = document.createElement('div');
    el.className = 'tab' + (parseInt(id) === activeId ? ' active' : '');
    el.dataset.id = id;
    el.innerHTML = `<span class="tab-name">${tab.name}</span><span class="tab-close" title="Close">×</span>`;
    el.addEventListener('click', e => {
      if (e.target.classList.contains('tab-close')) closeTab(parseInt(id));
      else switchTab(parseInt(id));
    });
    bar.appendChild(el);
  });
  bar.appendChild(addBtn);
}

function closeTab(id) {
  if (Object.keys(tabs).length <= 1) return;
  delete tabs[id];
  if (activeId === id) switchTab(parseInt(Object.keys(tabs)[0]));
  else renderTabs();
}

document.getElementById('add-tab').addEventListener('click', () => {
  saveActive();
  const id = tabCounter++;
  tabs[id] = { name: `tab${id}.js`, code: '// New tab\n' };
  switchTab(id);
});

// ── Output ───────────────────────────────────────────────────────────────────
const out = document.getElementById('output-scroll');

function ts() {
  return new Date().toLocaleTimeString('en-US', { hour12: false });
}

function serialize(v, depth) {
  depth = depth || 0;
  if (v === null)      return 'null';
  if (v === undefined) return 'undefined';
  if (typeof v === 'string')  return depth === 0 ? v : JSON.stringify(v);
  if (typeof v === 'number' || typeof v === 'boolean') return String(v);
  if (typeof v === 'function') return `[Function: ${v.name || 'anonymous'}]`;
  if (v instanceof Error) return `${v.name}: ${v.message}`;
  if (Array.isArray(v)) {
    if (depth > 1) return `[Array(${v.length})]`;
    const items = v.slice(0, 100).map(x => serialize(x, depth + 1));
    return `[ ${items.join(', ')}${v.length > 100 ? ', …' : ''} ]`;
  }
  if (typeof v === 'object') {
    if (depth > 1) return '{…}';
    try {
      const keys  = Object.keys(v).slice(0, 30);
      const pairs = keys.map(k => `${k}: ${serialize(v[k], depth + 1)}`);
      return `{ ${pairs.join(', ')}${Object.keys(v).length > 30 ? ', …' : ''} }`;
    } catch { return String(v); }
  }
  return String(v);
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function addEntry(type, icon, text) {
  const hint = out.querySelector('.e-hint');
  if (hint) hint.remove();
  const d = document.createElement('div');
  d.className = `entry e-${type}`;
  d.innerHTML = `<span class="e-ts">${ts()}</span><span class="e-ico">${icon}</span><span class="e-txt">${esc(text)}</span>`;
  out.appendChild(d);
  if (autoScroll) out.scrollTop = out.scrollHeight;
}

function addSep() {
  if (!out.children.length || out.querySelector('.e-hint')) return;
  const d = document.createElement('div');
  d.className = 'e-sep';
  out.appendChild(d);
}

// ── Run ──────────────────────────────────────────────────────────────────────
function run() {
  saveActive();
  addSep();

  const _log   = console.log;
  const _warn  = console.warn;
  const _error = console.error;
  const _info  = console.info;

  console.log   = (...a) => { addEntry('log',  '',  a.map(v => serialize(v)).join(' ')); _log(...a);   };
  console.warn  = (...a) => { addEntry('warn', '⚠', a.map(v => serialize(v)).join(' ')); _warn(...a);  };
  console.error = (...a) => { addEntry('err',  '✕', a.map(v => serialize(v)).join(' ')); _error(...a); };
  console.info  = (...a) => { addEntry('info', 'ℹ', a.map(v => serialize(v)).join(' ')); _info(...a);  };

  const t0 = performance.now();
  setStatus('Running…');

  try {
    const result = (new Function(cm.getValue()))();
    const ms = (performance.now() - t0).toFixed(1);
    if (result !== undefined) addEntry('ret', '←', serialize(result));
    setStatus(`Done in ${ms}ms`, 2500);
  } catch(e) {
    addEntry('err', '✕', serialize(e));
    setStatus(`Error: ${e.message}`, 4000);
  }

  console.log   = _log;
  console.warn  = _warn;
  console.error = _error;
  console.info  = _info;
  cm.focus();
}

// ── Controls ─────────────────────────────────────────────────────────────────
document.getElementById('btn-run').addEventListener('click', run);

document.getElementById('btn-clear').addEventListener('click', () => {
  out.innerHTML = '<div class="e-hint">// Cleared — ready for next run</div>';
  cm.focus();
});

document.getElementById('btn-reset').addEventListener('click', () => {
  if (confirm('Reset editor to the default example code?')) {
    cm.setValue(DEFAULT_CODE);
    tabs[activeId].code = DEFAULT_CODE;
    cm.focus();
  }
});

document.getElementById('btn-autoscroll').addEventListener('click', function() {
  autoScroll = !autoScroll;
  this.textContent = `auto-scroll ${autoScroll ? '✓' : '✗'}`;
});

document.getElementById('btn-wrap').addEventListener('click', function() {
  wordWrap = !wordWrap;
  cm.setOption('lineWrapping', wordWrap);
  this.textContent = wordWrap ? 'no-wrap' : 'wrap';
});

// ── Resizable divider ────────────────────────────────────────────────────────
const divider    = document.getElementById('divider');
const outputPane = document.getElementById('output-pane');
let dragging = false, startY = 0, startH = 0;

divider.addEventListener('mousedown', e => {
  dragging = true; startY = e.clientY; startH = outputPane.offsetHeight;
  document.body.style.cursor = 'ns-resize';
  document.body.style.userSelect = 'none';
});
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const newH = Math.max(80, Math.min(startH + (startY - e.clientY), window.innerHeight * 0.8));
  outputPane.style.height = newH + 'px';
});
document.addEventListener('mouseup', () => {
  dragging = false;
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
});

// ── Status ───────────────────────────────────────────────────────────────────
function setStatus(msg, clearAfter) {
  document.getElementById('status-msg').textContent = msg;
  clearTimeout(statusTimer);
  if (clearAfter) statusTimer = setTimeout(() => document.getElementById('status-msg').textContent = '', clearAfter);
}

// ── Init ─────────────────────────────────────────────────────────────────────
renderTabs();
cm.focus();
</script>
</body>
</html>
